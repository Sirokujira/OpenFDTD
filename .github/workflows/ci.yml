# OpenFDTD (処理ロジック) CI — CPU 版ソルバーのビルド + 実サンプルのスモーク実行。
# CUDA/MPI はランナーに無いため WITH_CUDA=OFF / WITH_MPI=OFF でビルドする
# (GPU/MPI 版のビルド検証は self-hosted ランナー導入時に拡張)。
name: CI

on:
  push:
    branches: [ main, "claude/**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  build-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # タグ push 時の Release 添付に使用
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libhdf5-dev

      - name: Configure (CPU only)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DWITH_CUDA=OFF -DWITH_MPI=OFF

      - name: Build ofd / ofd_post
        run: cmake --build build -j"$(nproc)"

      - name: Smoke test — solver (dipole sample)
        run: |
          mkdir -p /tmp/smoke && cp data/sample/dipole.ofd /tmp/smoke/
          cd /tmp/smoke
          "$GITHUB_WORKSPACE/bin/ofd" -n 2 dipole.ofd
          grep -q "normal end" ofd.log
          test -s ofd.out

      - name: Smoke test — post processor
        run: |
          cd /tmp/smoke
          "$GITHUB_WORKSPACE/bin/ofd_post" -n 2 dipole.ofd

      # TPA (二光子吸収) : 振幅 3 点を掃引し解析解 T=1/(1+β I0 L) と比較 (±7%)
      - name: Validation test — TPA slab
        run: sh data/sample/tpa_slab_check.sh "$GITHUB_WORKSPACE/bin/ofd" /tmp/smoke-tpa

      - name: Upload binaries (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ofd-linux-x64
          path: |
            bin/ofd
            bin/ofd_post

      # タグ (v*) push 時は Release にバイナリを添付する。
      # OpenFDTD-X (GUI) や統合テストはここから取得できる (公開リポジトリ)。
      - name: Package for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: tar czf ofd-linux-x64.tar.gz -C bin ofd ofd_post

      - name: Attach binaries to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ofd-linux-x64.tar.gz

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            /tmp/smoke/*.log
            /tmp/smoke-tpa/*.log
          if-no-files-found: ignore

  # macOS (Apple Silicon)。AppleClang は OpenMP を同梱しないため、
  # Homebrew の libomp を明示指定して find_package(OpenMP) を通す。
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write   # タグ push 時の Release 添付に使用
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libomp hdf5

      - name: Configure (CPU only)
        run: |
          OMP="$(brew --prefix libomp)"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DWITH_CUDA=OFF -DWITH_MPI=OFF \
            -DOpenMP_C_FLAGS="-Xclang -fopenmp -I${OMP}/include" \
            -DOpenMP_C_LIB_NAMES=omp \
            -DOpenMP_CXX_FLAGS="-Xclang -fopenmp -I${OMP}/include" \
            -DOpenMP_CXX_LIB_NAMES=omp \
            -DOpenMP_omp_LIBRARY="${OMP}/lib/libomp.dylib"

      - name: Build ofd / ofd_post
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Smoke test — solver (dipole sample)
        run: |
          mkdir -p /tmp/smoke && cp data/sample/dipole.ofd /tmp/smoke/
          cd /tmp/smoke
          "$GITHUB_WORKSPACE/bin/ofd" -n 2 dipole.ofd
          grep -q "normal end" ofd.log
          test -s ofd.out

      - name: Smoke test — post processor
        run: |
          cd /tmp/smoke
          "$GITHUB_WORKSPACE/bin/ofd_post" -n 2 dipole.ofd

      # TPA (二光子吸収) : 振幅 3 点を掃引し解析解 T=1/(1+β I0 L) と比較 (±7%)
      - name: Validation test — TPA slab
        run: sh data/sample/tpa_slab_check.sh "$GITHUB_WORKSPACE/bin/ofd" /tmp/smoke-tpa

      - name: Upload binaries (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ofd-macos-arm64
          path: |
            bin/ofd
            bin/ofd_post

      - name: Package for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: tar czf ofd-macos-arm64.tar.gz -C bin ofd ofd_post

      - name: Attach binaries to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ofd-macos-arm64.tar.gz

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-macos
          path: |
            /tmp/smoke/*.log
            /tmp/smoke-tpa/*.log
          if-no-files-found: ignore

  # Windows (MSVC)。依存は vcpkg (x64-windows-static-md 静的リンク) で導入し、
  # DLL 同梱不要の自己完結 exe を生成する。ビルドは MSVC 環境 + Ninja。
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write   # タグ push 時の Release 添付に使用
    steps:
      - uses: actions/checkout@v4

      # hdf5 の既定機能 szip は libaec を gitlab.dkrz.de から取得するが
      # 429 で落ちることがあるため、必要な core+zlib のみに絞る
      - name: Install dependencies (vcpkg)
        run: vcpkg install "hdf5[core,zlib]:x64-windows-static-md" --recurse

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (CPU only)
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DWITH_CUDA=OFF -DWITH_MPI=OFF
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md

      - name: Build ofd / ofd_post
        run: cmake --build build

      - name: Smoke test — solver (dipole sample)
        run: |
          New-Item -ItemType Directory -Force smoke | Out-Null
          Copy-Item data/sample/dipole.ofd smoke/
          Set-Location smoke
          & "$env:GITHUB_WORKSPACE\bin\ofd.exe" -n 2 dipole.ofd
          Write-Host ("ofd exit code: 0x{0:X8}" -f $LASTEXITCODE)
          if (Test-Path ofd.log) { Get-Content ofd.log -Tail 5 }
          if ($LASTEXITCODE -ne 0) { exit 1 }
          if (-not (Select-String -Path ofd.log -Pattern "normal end" -Quiet)) { Write-Error "no normal end"; exit 1 }
          if ((Get-Item ofd.out).Length -eq 0) { Write-Error "empty ofd.out"; exit 1 }
          & "$env:GITHUB_WORKSPACE\bin\ofd_post.exe" -n 2 dipole.ofd
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # TPA (二光子吸収) : 振幅 3 点を掃引し解析解 T=1/(1+β I0 L) と比較 (±7%)
      # (期待値の導出は data/sample/tpa_slab.ofd のコメント参照)
      - name: Validation test — TPA slab
        run: |
          $cases = @(@("5.0e7", 0.882830), @("1.0e8", 0.653217), @("1.5e8", 0.455687))
          $src = Get-Content data/sample/tpa_slab.ofd
          New-Item -ItemType Directory -Force smoke-tpa | Out-Null
          Set-Location smoke-tpa
          $fail = $false
          foreach ($c in $cases) {
            $amp = $c[0]; $texp = [double]$c[1]
            ($src -replace '^waveamp = .*', "waveamp = $amp") | Set-Content tpa_run.ofd
            & "$env:GITHUB_WORKSPACE\bin\ofd.exe" -n 2 tpa_run.ofd | Out-Null
            if ($LASTEXITCODE -ne 0) { Write-Error "ofd failed (waveamp=$amp)"; exit 1 }
            $line = (Select-String -Path ofd.log -Pattern "TPA: transmission").Line | Select-Object -Last 1
            if (-not $line) { Write-Error "no 'TPA: transmission' line in ofd.log"; exit 1 }
            $t = [double](($line -split ' ')[3])
            $err = [math]::Abs(($t - $texp) / $texp)
            Write-Host ("waveamp={0} T_fdtd={1} T_analytic={2} err={3:P2}" -f $amp, $t, $texp, $err)
            if ($err -gt 0.07) { $fail = $true }
          }
          Set-Location ..
          if ($fail) { Write-Error "TPA validation failed (tolerance 7%)"; exit 1 }
          Write-Host "TPA validation passed (tolerance 7%)"

      - name: Upload binaries (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ofd-windows-x64
          path: |
            bin/ofd.exe
            bin/ofd_post.exe

      - name: Package for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path bin/ofd.exe, bin/ofd_post.exe -DestinationPath ofd-windows-x64.zip

      - name: Attach binaries to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ofd-windows-x64.zip

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-windows
          path: |
            smoke/*.log
            smoke-rcwa/*.log
            smoke-tpa/*.log
          if-no-files-found: ignore
